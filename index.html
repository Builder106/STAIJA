<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are self-hosted now — see src/styles/fonts.css for the
         @font-face declarations + the metric-matched fallback faces.
         No fonts.googleapis.com preconnect or stylesheet link needed,
         which saves the third-party DNS + TLS + CSS round-trip on cold
         loads. The woff2 files live in /public/fonts/ and ride the
         same Vercel edge cache as the rest of the static assets. -->
    <!-- Preload the latin-subset IBM Plex Sans 700 woff2 — the LCP
         element on the homepage is the hero <h1> headline which uses
         the display face at 700. Preloading lets it download in
         parallel with the HTML+JS rather than waiting for the CSS
         parse to discover the @font-face. The hash in the filename
         is stable for as long as we don't re-run the regeneration
         script in src/styles/fonts.css; if it does change, this
         preload will 404 silently and we fall back to discovery via
         CSS — degraded but not broken. -->
    <link
      rel="preload"
      href="/fonts/zYXzKVElMYYaJe8bpLHnCwDKr932-G7dytD-Dmu1syxeKYbSB4Zh.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>STAIJA</title>
    <meta name="description" content="STAIJA nurtures Africa’s next generation of scientist‑leaders through research programs, mentorship and community." />

    <!-- Canonical URL — kept absolute so social scrapers and search
         engines resolve it regardless of which preview/staging host the
         page was crawled from. -->
    <link rel="canonical" href="https://staija.org/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, iMessage, Slack, …).
         These are static and apply to every route — Vite SPA can't ship
         per-route OG tags without prerendering, and social scrapers
         don't run JS. If/when we add SSR or a prerender step, these
         become per-route. -->
    <meta property="og:site_name" content="STAIJA" />
    <meta property="og:title" content="STAIJA — Africa’s next generation of scientist-leaders" />
    <meta property="og:description" content="Research programs, mentorship, and community for high-school and gap-year students across Africa." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://staija.org/" />
    <meta property="og:image" content="https://staija.org/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="2560" />
    <meta property="og:image:height" content="1280" />
    <meta property="og:image:alt" content="STAIJA — nurturing Africa’s next generation of scientist-leaders." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card — falls back to OG for fields it doesn't own, but
         summary_large_image must be declared explicitly to get the wide
         preview instead of a square thumbnail. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="STAIJA — Africa’s next generation of scientist-leaders" />
    <meta name="twitter:description" content="Research programs, mentorship, and community for high-school and gap-year students across Africa." />
    <meta name="twitter:image" content="https://staija.org/og-image.jpg" />
    <meta name="twitter:image:alt" content="STAIJA — nurturing Africa’s next generation of scientist-leaders." />

    <!-- Mobile browser chrome color. Updated live by useTheme on theme
         change; this default matches the light-mode paper color. -->
    <meta name="theme-color" content="#F1F5F9" />
    <!-- No-flash theme init. Runs synchronously before the body parses
         so [data-theme="..."] is set before the first paint — without
         this, dark-mode users see a white flash while Vue boots. Mirror
         of useTheme's resolution logic; keep them in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('staija.theme')
          var choice =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system'
          var resolved =
            choice === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : choice
          document.documentElement.dataset.theme = resolved
          document.documentElement.style.colorScheme = resolved
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.content = resolved === 'dark' ? '#0B0E12' : '#F1F5F9'
        } catch (e) {
          /* localStorage unavailable in sandbox / private mode — fall
             through to default light. */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
